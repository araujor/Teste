<!DOCTYPE html>
<html>

<title>Calculadora de Volumes (de Figuras 3D)</title>
</head>
<body>

	<div style="text-align: center;">
		<h1>
			<b>Calculadora de Volumes (de Figuras 3D)</b>
		</h1>
		
		<br>
		
		<form action="FigurasServlet" method="post">

		</form>
		
	</div>

</body>
